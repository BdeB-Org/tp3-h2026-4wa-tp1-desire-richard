<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container" style="max-width: 500px;">
        <h1>Création de travail</h1>
        <p class="small">Création de travail</p>

        <div id="message"></div>

        <form id="formTravail">
            <input type="text" id="titre" placeholder="Titre du travail" required> <br>
            <input type="text" id="description" placeholder="Description du travail" required> <br>
            <input type="file" id="fichier" placeholder="Fichier joint" required> <br>
            <input type="date" id="echeance" placeholder="Date de remise" required> <br>
            <input type="checkbox" id="statut_remise" placeholder="Travail remis" > <br>
            <button type="submit">Créer le travail</button>
        </form>
    </div>  
    
    <tbody id="tbodyTravaux"></tbody>

    <script src="js/auth.js"></script>
    <script>
        const form = document.getElementById('formTravail');
        const message = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            message.innerHTML = '';

            const titre = document.getElementById('titre').value.trim();
            const description = document.getElementById('description').value.trim();
            const fichier = document.getElementById('fichier').files[0];
            const echeance = document.getElementById('echeance').value.trim();
            const statut_remise = document.getElementById('statut_remise').checked;

            try {

                const res = await fetch('/api/travail', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + getToken() },
                    body: JSON.stringify({titre, description, fichier, echeance, statut_remise })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.message || 'Erreur lors de la création du travail');
                }

                saveToken(data.token);
                window.location.href = '/indexTravail.html';
            } catch (err) {
                message.innerHTML = '<div class="message error">' + err.message + '</div>';
            }
        });
    </script>
</body>

</html>
