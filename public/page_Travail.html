<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Travail</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <div class="topbar">
        <h1>Section Travail</h1>
        <p class="small">Ajout et affichage dans un tableau</p>
    </div>
    <div class="actions">
        <a href="/listeTravail.html" class="btn-link">Voir la liste complète</a>
        <button class="secondary" onclick="logout()">Déconnexion</button>
    </div>
        <div id="message"></div>

        <h2>Ajouter un travail</h2>
        <form id="formTravail">
            <input type="number" id="id_cours" placeholder="ID du cours" required> <br>
            <input type="text" id="titre" placeholder="Titre du travail" required> <br>
            <input type="text" id="description" placeholder="Description du travail" required> <br>
            <input type="file" id="fichier" placeholder="Fichier joint" required> <br>
            <input type="date" id="echeance" placeholder="Date de remise" required> <br>
            <input type="checkbox" id="statut_remise" placeholder="Travail remis" > <br>
            <button type="submit">Créer le travail</button>
        </form>
    </div>  

    
    
    <tbody id="tbodyTravaux"></tbody>

    <script src="js/auth.js"></script>
    <script src="js/indexTravail.js"></script>
   
</body>

</html>
