<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des travaux</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div>
                <h1>Liste des travaux</h1>

            </div>
            <div class="actions">
                <a href="/page_Travail.html" class="btn-link">Retour à l'ajout</a>
                <button class="secondary" onclick="logout()">Déconnexion</button>
            </div>
        </div>

        <div id="message"></div>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>ID_cours</th>
                    <th>Titre</th>
                    <th>Description</th>
                    <th>Fichier</th>
                    <th>Echeance</th>
                    <th>Statut Remise</th>
                </tr>
            </thead>
            <tbody id="tbodyTravaux"></tbody>
        </table>
    </div>

<script src="js/auth.js"></script>
<script src="js/listeTravail.js"></script>
