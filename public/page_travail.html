<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container" style="max-width: 500px;">
        <h1>Création de travail</h1>
        <p class="small">Création de travail</p>

        <div id="message"></div>

        <form id="workForm">
            <input type="text" id="titre" placeholder="Titre du travail" required> <br>
            <input type="text" id="description" placeholder="Description du travail" required> <br>
            <input type="file" id="fichier" placeholder="Fichier joint" required> <br>
            <input type="date" id="date" placeholder="Date de remise" required> <br>
            <input type="checkbox" id="statu_remise" placeholder="Travail remis" required> <br>
            <button type="submit">Créer le travail</button>
        </form>
    </div>  
    
</body>

<script>
   const form = document.getElementById('workForm');
   const messsageDiv = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
         e.preventDefault();
    
         const titre = document.getElementById('titre').value;
         const description = document.getElementById('description').value;
         const fichier = document.getElementById('fichier').files[0];
         const date = document.getElementById('date').value;
         const statu_remise = document.getElementById('statu_remise').checked;
    

    
         try {
              const response = await fetch('/api/auth/travaux', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json'},
                body: JSON.stringify({ titre, description, date, statu_remise })
              });
              
              const data = await response.json();

              if (response.ok) {
                messsageDiv.textContent = 'Travail créé avec succès!';
                messsageDiv.style.color = 'green';
                form.reset();
              } else {
                throw new Error('Erreur lors de la création du travail');
              }
         } catch (error) {
              messsageDiv.textContent = error.message;
              messsageDiv.style.color = 'red';
         }
    });

</script>
</html>
