<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
        <div class="container">
        <div class="topbar">
            <div>
                <h1>Gestion des utilisateurs</h1>
                <p class="small">Ajout et affichage dans un tableau</p>
            </div>
            <div class="actions">
                <a class="btn-link" href="/liste.html">Voir la liste complète des utilisateurs</a>
                <a class="btn-link" href="/page_Travail.html">Ajouter un travail</a>
                <button class="secondary" onclick="logout()">Déconnexion</button>
            </div>
        </div>

        <div id="message"></div>

        <h2>Ajouter un utilisateur</h2>
        <form id="formAjout">
            <!-- <input type="text" id="type_utilisateur" placeholder="Type d'utilisateur" required> -->
            <select name="user-type" id="user-select" required>
                <option value="">Veuillez choisir une option</option>
                <option value="admin">Administrateur</option>
                <option value="enseignant">Enseignant(e)</option>
                <option value="etudiant">Étudiant(e)</option>
            </select>
            <input type="text" id="prenom" placeholder="Prénom" required>
            <input type="text" id="nom" placeholder="Nom" required>
            <input type="email" id="courriel" placeholder="Courriel" required>
            <input type="password" id="mot_de_passe" placeholder="Mot de passe" required>
            <button type="submit">Ajouter</button>
        </form>

        <h2>Ensemble des utilisateurs</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Type d'utilisateur</th>
                    <th>Prénom</th>
                    <th>Nom</th>
                    <th>Courriel</th>
                    <th>Mot de passe</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tbodyEtudiants"></tbody>
        </table>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
