<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <h1>Connexion</h1>
        <p class="small">Compte de démonstration : <strong>email : belldesire@bdeb.qc.ca</strong> / <strong>password : admin</strong></p>

        <div id="message"></div>

        <form id="loginForm">
            <input type="text" id="courriel" placeholder="Courriel" required>
            <input type="password" id="mot_de_passe" placeholder="Mot de passe" required>
            <button type="submit">Se connecter</button>
        </form>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const form = document.getElementById('loginForm');
        const message = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            message.innerHTML = '';

            const courriel = document.getElementById('courriel').value.trim();
            const mot_de_passe = document.getElementById('mot_de_passe').value.trim();

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ courriel, mot_de_passe })
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.message || 'Erreur de connexion');
                }

                saveToken(data.token);
                window.location.href = '/index.html';
            } catch (err) {
                message.innerHTML = '<div class="message error">' + err.message + '</div>';
            }
        });
    </script>
</body>
</html>
