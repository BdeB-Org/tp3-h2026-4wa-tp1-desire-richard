<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier un étudiant</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container" style="max-width: 700px;">
        <div class="topbar">
            <div>
                <h1>Modifier un Travail</h1>
            </div>
            <div class="actions">
                <a class="btn-link" href="/listeTravail.html">Retour à la liste</a>
                <button class="secondary" onclick="logout()">Déconnexion</button>
            </div>
        </div>

        <div id="message"></div>

        <form id="formEdit">
            <input type="number" id="id_cours" placeholder="ID du cours" required> <br>
            <input type="text" id="titre" placeholder="Titre du travail" required> <br>
            <input type="text" id="description" placeholder="Description du travail" required> <br>
            <input type="file" id="fichier" placeholder="Fichier joint" required> <br>
            <input type="date" id="echeance" placeholder="Date de remise" required> <br>
            <input type="checkbox" id="statut_remise" placeholder="Travail remis" > <br>
            <button type="submit">Enregistrer les modifications</button>
        </form>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/editTravail.js"></script>
</body>
</html>
